[project]
name = "docs-validator"
version = "0.0.1"
requires-python = ">=3.11"
dependencies = ["networkx>=2.8", "pydantic>=2.0"]

[tool.pytest.ini_options]
addopts = "--cov=src/validator --cov-report=term-missing"

[tool.ruff]
line-length = 120
target-version = "py311"
select = ["E", "F", "B", "I"]
